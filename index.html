  <meta property="og:description" content="A lucky draw by dropping marbles, made by lazygyu">

<body>
<script type="module" src="./src/index.ts"></script>
<script type="text/javascript">
  window.dataLayer = window.dataLayer || [];

  function gtag() {
    dataLayer.push(arguments);
  }

  gtag('js', new Date());
  gtag('config', 'G-5899C1DJM0');

  function getNames() {
    const value = document.querySelector('#in_names').value.trim();
    return value.split(/[,\r\n]/g).map(v => v.trim()).filter(v => !!v);
  }

  function parseName(nameStr) {
    const weightRegex = /(\/\d+)/;
    const countRegex = /(\*\d+)/;
    const hasWeight = weightRegex.test(nameStr);
    const hasCount = countRegex.test(nameStr);
    const name = /^\s*([^\/*]+)?/.exec(nameStr)[1];
    const weight = hasWeight ? parseInt(weightRegex.exec(nameStr)[1].replace('/', '')) : 1;
    const count = hasCount ? parseInt(countRegex.exec(nameStr)[1].replace('*', '')) : 1;
    return {
      name,
      weight,
      count,
    };
  }

  function getReady() {
    const names = getNames();
    ready = names.length > 0;
    localStorage.setItem('mbr_names', names.join(','));

    // 레이스가 진행 중이거나(꼴찌 모드는 마블이 골인할 때마다 _marbles.length가 줄어들어
    // 등수 재계산이 꼬임) 관람 중이면, 배경 새로고침이 엔진 상태를 절대 건드리면 안 됨
    if (isWatching || raceRunning) return;

    window.roulette.setMarbles(names);
    switch (winnerType) {
      case 'first':
        setWinnerRank(1);
        break;
      case 'last':
        const total = window.roulette.getCount();
        setWinnerRank(total);
        break;
    }
  }

  function setWinnerRank(rank) {
    document.querySelector('#in_winningRank').value = rank;
    window.options.winningRank = rank - 1;
    window.roulette.setWinningRank(window.options.winningRank);

    if (winnerType === 'first') {
      document.querySelector('.btn-first-winner').classList.toggle('active', true);
      document.querySelector('.btn-last-winner').classList.toggle('active', false);
      document.querySelector('#in_winningRank').classList.toggle('active', false);
    } else if (winnerType === 'last') {
      document.querySelector('.btn-first-winner').classList.toggle('active', false);
      document.querySelector('.btn-last-winner').classList.toggle('active', true);
      document.querySelector('#in_winningRank').classList.toggle('active', false);
    } else if (winnerType === 'custom') {
      document.querySelector('.btn-first-winner').classList.toggle('active', false);
      document.querySelector('.btn-last-winner').classList.toggle('active', false);
      document.querySelector('#in_winningRank').classList.toggle('active', true);
    }
  }


  let ready = false;
  let winnerType = 'first';
  let restaurantsCache = [];
  let pendingEditId = null;
  let matchedRestaurant = null;

  let ws = null;
  let broadcastInterval = null;
  let isWatching = false;
  let raceRunning = false;

  function connectWs(useDirect) {
    const protocol = location.protocol === 'https:' ? 'wss://' : 'ws://';
    // parcel의 dev 프록시는 웹소켓 업그레이드 이후 프레임을 깨뜨리는 버그가 있어서,
    // 같은 출처 경로가 실패하면 백엔드 포트로 직접 재연결한다 (운영 환경은 같은 출처라 영향 없음).
    const target = useDirect
      ? `${protocol}${location.hostname}:4000/api/ws`
      : `${protocol}${location.host}/api/ws`;
    ws = new WebSocket(target);
    ws.addEventListener('message', (e) => {
      let msg;
      try {
        msg = JSON.parse(e.data);
      } catch (err) {
        return;
      }
      if (msg.type === 'start') {
        handleRemoteStart(msg);
      } else if (msg.type === 'frame' && isWatching) {
        window.roulette.applyRemoteFrame(msg);
      }
    });
    ws.addEventListener('error', () => {
      if (!useDirect) ws.close();
    });
    ws.addEventListener('close', () => {
      setTimeout(() => connectWs(true), useDirect ? 2000 : 300);
    });
  }

  function sendWs(payload) {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify(payload));
    }
  }

  function stopBroadcasting() {
    if (broadcastInterval) {
      clearInterval(broadcastInterval);
      broadcastInterval = null;
    }
  }

  function handleRemoteStart(msg) {
    isWatching = true;
    ready = false;
    window.roulette.enterRemoteMode(msg);
    document.querySelector('#settings').classList.add('hide');
    document.querySelector('#sltMap').disabled = true;
    document.querySelector('#btnStart').disabled = true;
    document.querySelector('#btnShuffle').disabled = true;
    simpleToast(`'${msg.hostNickname}'님과 함께 룰렛을 봅니다`);
  }

  function stopWatching() {
    if (!isWatching) return;
    isWatching = false;
    window.roulette.exitRemoteMode();
    document.querySelector('#sltMap').disabled = false;
    document.querySelector('#btnStart').disabled = false;
    document.querySelector('#btnShuffle').disabled = false;
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function simpleToast(msg) {
    const toast = document.createElement('div');
    toast.classList.add('toast');
    toast.innerHTML = msg;

    if (window.translateElement) {
      console.log('try to translate');
      window.translateElement(toast);
    }

    document.body.appendChild(toast);
    setTimeout(() => {
      document.body.removeChild(toast);
    }, 1200);
  }

  const ALLOWED_NICKNAMES = ['lm', 'zv', 'kb', 'ko'];

  function getNickname() {
    const value = (localStorage.getItem('lunch_nickname') || '').trim();
    return ALLOWED_NICKNAMES.includes(value) ? value : '';
  }

  function setNickname(nickname) {
    localStorage.setItem('lunch_nickname', nickname.trim());
  }

  function showNicknameGate() {
    document.documentElement.classList.remove('nick-chosen');
  }

  function updateNicknameLabel() {
    const label = document.querySelector('#currentNicknameLabel');
    if (label) label.textContent = getNickname();
  }

  function enterAppWithNickname(nickname) {
    setNickname(nickname);
    document.documentElement.classList.add('nick-chosen');
    updateNicknameLabel();
    applyRestaurants(restaurantsCache);
    simpleToast(`'${nickname}'님, 환영합니다!`);
  }

  async function apiGetRestaurants() {
    const res = await fetch('/api/restaurants');
    if (!res.ok) throw new Error('failed to load restaurants');
    return res.json();
  }

  async function apiCreateRestaurant(payload) {
    const res = await fetch('/api/restaurants', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    return { ok: res.ok, status: res.status, body: await res.json() };
  }

  async function apiRateRestaurant(id, payload) {
    const res = await fetch(`/api/restaurants/${id}/ratings`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    return { ok: res.ok, status: res.status, body: await res.json() };
  }

  async function apiDeleteRestaurant(id) {
    const res = await fetch(`/api/restaurants/${id}`, { method: 'DELETE' });
    return { ok: res.ok, status: res.status, body: await res.json() };
  }


  function applyRestaurants(list, pushToEngine = true) {
    restaurantsCache = list;
    const nickname = getNickname();
    const listEl = document.querySelector('#restaurantList');
    listEl.innerHTML = '';

    list.forEach((r) => {
      const mine = r.ratings.find((rt) => rt.nickname === nickname);
      const li = document.createElement('li');
      li.innerHTML = `
        <span class="r-name">${escapeHtml(r.name)}</span>
        <span class="r-meal">식권대장 ${r.mealTicket}</span>
        <span class="r-score">점수 ${r.score.toFixed(1)}</span>
        <span class="r-count">${r.ballCount}개</span>
        <span class="r-raters">${r.raterCount}명 평가</span>
        <button class="btn-rate" data-id="${r.id}">${mine ? '평가 수정' : '평가하기'}</button>
        <button class="btn-remove" data-id="${r.id}">삭제</button>
      `;
      listEl.appendChild(li);
    });

    const datalist = document.querySelector('#restaurantNames');
    datalist.innerHTML = list.map((r) => `<option value="${escapeHtml(r.name)}"></option>`).join('');

    const namesStr = list
      .map((r) => (r.ballCount > 0 ? `${r.name}*${r.ballCount}` : null))
      .filter((v) => !!v)
      .join(',');

    document.querySelector('#in_names').value = namesStr;

    // 배경 자동 새로고침(폴링)은 목록 표시만 갱신하고, 실행 중이거나 방금 끝난
    // 룰렛 엔진은 절대 건드리지 않는다 — 셔플/추가/평가/삭제 같은 명시적 행동에서만 반영
    if (pushToEngine) {
      getReady();
    } else {
      ready = namesStr.length > 0;
      localStorage.setItem('mbr_names', namesStr);
    }
  }

  async function refreshRestaurants(pushToEngine = true) {
    try {
      applyRestaurants(await apiGetRestaurants(), pushToEngine);
    } catch (e) {
      console.error(e);
    }
  }

  function setMealTicketDisplay(mealTicket) {
    const row = document.querySelector('#dlg_mealTicketRow');
    const display = document.querySelector('#dlg_mealTicketDisplay');
    if (mealTicket) {
      row.classList.add('hide');
      display.classList.remove('hide');
      display.textContent = `식권대장: ${mealTicket} (기존 식당)`;
    } else {
      row.classList.remove('hide');
      display.classList.add('hide');
    }
  }

  function openDialog(restaurant) {
    if (!getNickname()) {
      simpleToast('닉네임을 먼저 설정해주세요.');
      return;
    }

    const nameInput = document.querySelector('#dlg_name');
    const tasteInput = document.querySelector('#dlg_taste');
    const distanceSelect = document.querySelector('#dlg_distance');
    const mealTicketSelect = document.querySelector('#dlg_mealTicket');
    const nickname = getNickname();

    matchedRestaurant = null;

    if (restaurant) {
      pendingEditId = restaurant.id;
      nameInput.value = restaurant.name;
      nameInput.readOnly = true;
      setMealTicketDisplay(restaurant.mealTicket);
      const mine = restaurant.ratings.find((r) => r.nickname === nickname);
      tasteInput.value = mine ? mine.taste : 5;
      distanceSelect.value = mine ? mine.distance : 'medium';
    } else {
      pendingEditId = null;
      nameInput.value = '';
      nameInput.readOnly = false;
      setMealTicketDisplay(null);
      tasteInput.value = 5;
      distanceSelect.value = 'medium';
      mealTicketSelect.value = 'X';
    }

    document.querySelector('#restaurantDialog').showModal();
    nameInput.focus();
  }

  document.addEventListener('DOMContentLoaded', () => {
    initialize();
  });

  function initialize() {
    if (!window.roulette || !window.roulette.isReady) {
      console.log('does not loaded yet');
      setTimeout(initialize, 100);
      return;
    }
    console.log('initializing start');

    if (getNickname()) {
      document.documentElement.classList.add('nick-chosen');
      updateNicknameLabel();
    } else {
      showNicknameGate();
    }
    connectWs();

    refreshRestaurants();
    setInterval(() => {
      if (!document.querySelector('#restaurantDialog').open) {
        refreshRestaurants(false);
      }
    }, 15000);

    document.querySelectorAll('.btn-nickname').forEach((btn) => {
      btn.addEventListener('click', () => {
        enterAppWithNickname(btn.getAttribute('data-nickname'));
      });
    });

    document.querySelector('#btnChangeNickname').addEventListener('click', () => {
      showNicknameGate();
    });

    document.querySelector('#btnOpenAddDialog').addEventListener('click', () => {
      openDialog(null);
    });

    document.querySelector('#btnCancelDialog').addEventListener('click', () => {
      document.querySelector('#restaurantDialog').close();
    });

    document.querySelector('#restaurantDialog').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) e.currentTarget.close();
    });

    document.querySelector('#dlg_name').addEventListener('input', (e) => {
      if (pendingEditId !== null) return;
      const typed = e.target.value.trim().toLowerCase();
      matchedRestaurant = restaurantsCache.find((r) => r.name.toLowerCase() === typed) || null;
      setMealTicketDisplay(matchedRestaurant ? matchedRestaurant.mealTicket : null);
    });

    document.querySelector('#restaurantForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const nickname = getNickname();

      const name = document.querySelector('#dlg_name').value.trim();
      const taste = parseInt(document.querySelector('#dlg_taste').value, 10);
      const distance = document.querySelector('#dlg_distance').value;
      const mealTicket = document.querySelector('#dlg_mealTicket').value;

      if (!name) {
        simpleToast('식당 이름을 입력해주세요.');
        return;
      }
      if (Number.isNaN(taste) || taste < 1 || taste > 10) {
        simpleToast('맛 점수는 1~10 사이로 입력해주세요.');
        return;
      }

      const targetId = pendingEditId !== null ? pendingEditId : (matchedRestaurant ? matchedRestaurant.id : null);

      let result;
      if (targetId) {
        result = await apiRateRestaurant(targetId, { nickname, taste, distance });
      } else {
        result = await apiCreateRestaurant({ name, mealTicket, nickname, taste, distance });
        if (!result.ok && result.body.error === 'exists') {
          result = await apiRateRestaurant(result.body.restaurantId, { nickname, taste, distance });
        }
      }

      if (!result.ok) {
        simpleToast(result.body.message || '오류가 발생했습니다.');
        return;
      }

      applyRestaurants(result.body);
      document.querySelector('#restaurantDialog').close();
    });

    document.querySelector('#restaurantList').addEventListener('click', async (e) => {
      const rateBtn = e.target.closest('.btn-rate');
      if (rateBtn) {
        const id = Number(rateBtn.getAttribute('data-id'));
        openDialog(restaurantsCache.find((r) => r.id === id));
        return;
      }
      const removeBtn = e.target.closest('.btn-remove');
      if (removeBtn) {
        const id = Number(removeBtn.getAttribute('data-id'));
        const restaurant = restaurantsCache.find((r) => r.id === id);
        if (!restaurant || !confirm(`'${restaurant.name}'을(를) 삭제할까요? 모든 평가가 함께 삭제됩니다.`)) return;
        const result = await apiDeleteRestaurant(id);
        if (result.ok) applyRestaurants(result.body);
      }
    });

    document.querySelector('#btnShuffle').addEventListener('click', () => {
      raceRunning = false;
      getReady();
    });

    document.querySelector('#btnStart').addEventListener('click', () => {
      if (!ready || isWatching) return;
      gtag && gtag('event', 'start', {
        'event_category': 'roulette',
        'event_label': 'start',
        'value': window.roulette.getCount(),
      });
      const names = getNames();
      const marbles = names.map(n => {
        const p = parseName(n);
        return { name: p.name, count: p.count };
      });
      if (typeof umami !== 'undefined') {
        umami.track('start', { count: window.roulette.getCount() });
        marbles.forEach(m => {
          umami.track('marble', { name: m.name, count: m.count });
        });
      }
      window.roulette.start();
      raceRunning = true;
      document.querySelector('#settings').classList.add('hide');

      const layout = window.roulette.getMarbleLayout();
      sendWs({ type: 'start', ...layout, hostNickname: getNickname() || '누군가' });

      stopBroadcasting();
      broadcastInterval = setInterval(() => {
        sendWs({ type: 'frame', ...window.roulette.getSnapshotForBroadcast() });
      }, 50);
    });

    document.querySelector('#chkAutoRecording').addEventListener('change', (e) => {
      window.options.autoRecording = e.target.matches(':checked');
      window.roulette.setAutoRecording(window.options.autoRecording);
    });

    document.querySelector('#chkSkill').addEventListener('change', (e) => {
      window.options.useSkills = e.target.matches(':checked');
      window.roulette.setWinningRank(window.options.winningRank);
    });

    document.querySelector('#chkDarkMode').addEventListener('change', (e) => {
      window.options.darkMode = e.target.matches(':checked');
      window.roulette.setTheme(window.options.darkMode ? 'dark' : 'light');
      document.documentElement.classList.toggle('light', !window.options.darkMode);
    });

    document.querySelector('#in_winningRank').addEventListener('change', (e) => {
      const v = parseInt(e.target.value, 10);
      winnerType = 'custom';
      setWinnerRank(isNaN(v) ? 0 : v);
    });

    document.querySelector('.btn-last-winner').addEventListener('click', () => {
      const total = window.roulette.getCount();
      winnerType = 'last';
      setWinnerRank(total);
    });
    document.querySelector('.btn-first-winner').addEventListener('click', () => {
      winnerType = 'first';
      setWinnerRank(1);
    });

    window.roulette.addEventListener('goal', () => {
      ready = false;
      if (broadcastInterval) {
        // 방금 확정된 winnerId가 담긴 마지막 프레임을 반드시 한 번 더 보낸 뒤 중계를 멈춘다
        sendWs({ type: 'frame', ...window.roulette.getSnapshotForBroadcast() });
      }
      stopBroadcasting();
      setTimeout(() => {
        document.querySelector('#settings').classList.remove('hide');
        // 우승자 화면이 다 보여진 뒤에야 배경 새로고침이 다시 엔진을 건드리게 허용
        raceRunning = false;
        stopWatching();
      }, 3000);
    });

    window.roulette.addEventListener('message', (e) => {
      simpleToast(e.detail);
    });

    const toggleBtn = document.querySelector('#btnToggleSettings');
    const collapsible = document.querySelector('.collapsible-rows');
    toggleBtn.addEventListener('click', () => {
      collapsible.classList.toggle('collapsed');
      toggleBtn.querySelector('.toggle-arrow').textContent =
        collapsible.classList.contains('collapsed') ? '▲' : '▼';
    });

    document.querySelector('#btnShuffle').click();

    const maps = window.roulette.getMaps();
    const mapSelector = document.querySelector('#sltMap');
    maps.forEach((map) => {
      const option = document.createElement('option');
      option.value = map.index;
      option.innerHTML = map.title;
      option.setAttribute('data-trans', '');
      window.translateElement(option);
      mapSelector.append(option);
    });
    mapSelector.addEventListener('change', (e) => {
      if (isWatching) return;
      const index = e.target.value;
      window.roulette.setMap(index);
    });

    // const checkDonateButtonLoaded = () => {
    //   const btn = document.querySelector('span.bmc-btn-text');
    //   if (!btn) {
    //     setTimeout(checkDonateButtonLoaded, 100);
    //   } else {
    //     console.log('donation button has been loaded');
    //     btn.setAttribute('data-trans', '');
    //     window.translateElement(btn);
    //   }
    // };
    // setTimeout(checkDonateButtonLoaded, 100);

    const currentNotice = 7;
    const noticeKey = 'lastViewedNotification';

    const closeNotice = () => {
      document.querySelector('#notice').style.display = 'none';
      localStorage.setItem(noticeKey, currentNotice.toString());
    };

    const openNotice = () => {
      console.log('openNotice');
      document.querySelector('#notice').style.display = 'flex';
    };

    document.querySelector('#closeNotice').addEventListener('click', () => {
      closeNotice();
    });

    document.querySelector('#btnNotice').addEventListener('click', () => {
      openNotice();
    });

    const checkNotice = () => {
      const lastViewed = localStorage.getItem(noticeKey);
      console.log('lastViewed', lastViewed);
      if (lastViewed === null || Number(lastViewed) < currentNotice) {
        openNotice();
      }
    };

    checkNotice();
  }
</script>
<div id="nicknameGate" class="nickname-gate">
  <div class="nickname-gate-card">
    <h2>점심 메뉴 룰렛</h2>
    <p>닉네임을 선택해주세요</p>
    <div class="nickname-options">
      <button class="btn-nickname" data-nickname="lm">lm</button>
      <button class="btn-nickname" data-nickname="zv">zv</button>
      <button class="btn-nickname" data-nickname="kb">kb</button>
      <button class="btn-nickname" data-nickname="ko">ko</button>
    </div>
  </div>
</div>
<div id="settings" class="settings">
  <div class="right">
    <button id="btnToggleSettings" class="btn-toggle-settings">
      <span data-trans>Settings</span>
      <i class="toggle-arrow">▲</i>
    </button>
    <div class="collapsible-rows collapsed">
      <div class="row">
        <label for='sltMap'>
          <i class="icon map"></i>
          <span data-trans>Map</span>
        </label>
        <select id="sltMap"></select>
      </div>
      <div class="row row-toggles">
        <div class='toggle-item'>
          <label for='chkAutoRecording'>
            <i class="icon record"></i>
            <span data-trans>Recording</span>
          </label>
          <input type="checkbox" id="chkAutoRecording" />
        </div>
        <div class='toggle-item'>
          <label for='chkSkill'>
            <i class="icon bomb"></i>
            <span data-trans>Using skills</span>
          </label>
          <input type="checkbox" id="chkSkill" checked />
        </div>
      </div>
      <div class="row">
        <label>
          <i class="icon trophy"></i>
          <span data-trans>The winner is</span>
        </label>
        <div class="btn-group">
          <button class="btn-winner btn-first-winner active" data-trans>First</button>
          <button class="btn-winner btn-last-winner" data-trans>Last</button>
          <input type="number" id="in_winningRank" value="1" min="1" />
        </div>
      </div>
      <div class="row row-theme">
        <div class='theme'>
          <i class='icon sun'></i>
          <input type='checkbox' id='chkDarkMode' checked />
          <i class='icon moon'></i>
        </div>
      </div>
    </div>
  </div>
  <div class="left">
    <div class="nickname-bar">
      <span id="currentNicknameLabel"></span>
      <button id="btnChangeNickname" class="btn">닉네임 변경</button>
    </div>
    <div class="restaurant-header">
      <h3>점심 메뉴 목록</h3>
      <button id="btnOpenAddDialog" class="btn">+ 메뉴 추가/평가</button>
    </div>
    <ul id="restaurantList" class="restaurant-list"></ul>
    <textarea id="in_names" readonly class="visually-hidden"></textarea>
    <div class="actions">
      <button id="btnNotice">
        <i class="icon megaphone"></i>
      </button>
      <a href='https://marblerouletteshop.com' target='_blank' id="btnShop" class='btn new' title='MarbleRoulette Shop'>
        <img src='assets/images/marblerouletteshop.png' />
      </a>
      <div class="sep"></div>
      <button id="btnShuffle">
        <i class="icon shuffle"></i>
        <span data-trans>Shuffle</span>
      </button>
      <button id="btnStart">
        <i class="icon play"></i>
        <span data-trans>Start</span>
      </button>
    </div>
  </div>
</div>
<dialog id="restaurantDialog" class="restaurant-dialog">
  <form id="restaurantForm">
    <h3>메뉴 추가 / 평가</h3>
    <label for="dlg_name">식당 이름</label>
    <input type="text" id="dlg_name" list="restaurantNames" placeholder="식당 이름" required />
    <datalist id="restaurantNames"></datalist>

    <label for="dlg_taste">맛 (1~10)</label>
    <input type="number" id="dlg_taste" min="1" max="10" value="5" required />

    <label for="dlg_distance">거리</label>
    <select id="dlg_distance">
      <option value="near">가까움</option>
      <option value="medium" selected>중간</option>
      <option value="far">멀음</option>
    </select>

    <div id="dlg_mealTicketRow">
      <label for="dlg_mealTicket">식권대장</label>
      <select id="dlg_mealTicket">
        <option value="O">O</option>
        <option value="X" selected>X</option>
      </select>
    </div>
    <div id="dlg_mealTicketDisplay" class="hide"></div>

    <div class="dialog-actions">
      <button type="button" id="btnCancelDialog">취소</button>
      <button type="submit" class="btn">저장</button>
    </div>
  </form>
</dialog>
<div id="notice">
  <h1>Notice</h1>
  <div class="notice-body">
    <h2>커스텀 룰렛 교사 특별 연장 안내</h2>
    <p>
      교육 현장에서 마블 룰렛을 사용하시는 교사 분들을 위한 커스텀 룰렛 기간 연장을 상시 지원하고 있습니다.<br />
      <a href='https://marblerouletteshop.com/news/2' target='_blank'>상세한 내용은 여기를 클릭해 확인하세요.</a>
    </p>
  </div>
  <div class="notice-action">
    <button id="closeNotice" data-trans>Close</button>
  </div>
</div>

</div>
